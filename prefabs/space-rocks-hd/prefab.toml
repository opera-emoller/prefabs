asset_bundle = true
license = "Apache-2.0"
description = "Space Rocks HD — an HD asset pack for a top-down Asteroids-style arcade shooter: shaded cartoon spaceships, tumbling asteroids, glowing blasters and lasers, planets, and rendered starfield/nebula backgrounds with explosion, muzzle-flash and thruster VFX."
tags = [ "genre:shmup", "theme:space", "theme:sci-fi", "projection:top-down" ]

# Demo-only resources: present so `gmx run` works here, but kept out of
# the published index and out of what consumers pull.
exclude = [
  "objects/obj_demo",
  "rooms/rm_demo",
]

