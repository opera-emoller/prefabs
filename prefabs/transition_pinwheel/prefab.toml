kind = "library"
license = "MIT"
display_name = "Pinwheel Room Transition"
description = "Pinwheel room-transition library: a drop-in animated pinwheel wipe between rooms. A single room_goto_transition_pinwheel(room, time, [speed]) call captures the outgoing and incoming rooms to surfaces and composites them through a shader that sweeps a rotating angular wedge to reveal the new room."
tags = [ "role:vfx", "capability:shader-effect" ]

[export]
include = [
  "scripts/scr_transition_pinwheel",
  "objects/obj_transition_pinwheel",
  "shaders/shdr_pin_wheel",
]

[assets."scripts/scr_transition_pinwheel"]
description = "Public API exposing room_goto_transition_pinwheel(room, time, [speed]) — the single entry point that starts a pinwheel transition to the target room over the given duration, with an optional spin speed (default 2.0). Spawns the driver object and ignores calls made during an active transition."

[assets."objects/obj_transition_pinwheel"]
description = "Persistent driver object that captures the outgoing room to a surface (Pre-Draw), switches rooms, captures the incoming room to a second surface, then composites the two through the pinwheel shader on Draw-GUI-End with a 0->1 progress uniform, freeing its surfaces and destroying itself when the duration elapses."

[assets."shaders/shdr_pin_wheel"]
description = "GLSL ES 3.00 fragment shader that samples the outgoing (from_tex) and incoming (to_tex) rooms and mixes them per pixel by a rotating angular-wedge test, producing the spinning pinwheel wipe driven by the progress and speed uniforms."
