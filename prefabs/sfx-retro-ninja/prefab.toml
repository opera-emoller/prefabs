[assets."sounds/MP3_Box_Break"]
description = "Short crunchy bit-crushed smash, ~0.45s — a crate or box shattering."
tags = [ "asset_type:sound", "audio_type:sfx", "subject:crate" ]

[assets."sounds/MP3_Coin_Collect"]
description = "Bright chiptune coin pickup chime, ~0.6s — classic platformer coin collect."
