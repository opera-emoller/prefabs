id = "sfx-retro-ninja"
version = "1.0.0"
kind = "asset"
license = "Apache-2.0"
description = "A retro platformer SFX pack of ~28 bit-crushed, chiptune-flavored one-shots covering coin pick-ups, movement, combat, hits, and menu UI blips."
tags = [ "genre:platformer", "style:retro", "role:audio" ]

[export]
include = [
  "sounds/MP3_Box_Break",
  "sounds/MP3_Coin_Collect",
  "sounds/MP3_Dash",
  "sounds/MP3_Enemy_Death1",
  "sounds/MP3_Enemy_Death2",
  "sounds/MP3_Enemy_Stomped_On",
  "sounds/MP3_Extra_Life",
  "sounds/MP3_Headbonk",
  "sounds/MP3_Jump",
  "sounds/MP3_Jump_Land",
  "sounds/MP3_Option_Choose",
  "sounds/MP3_Option_Select",
  "sounds/MP3_Player_Death1",
  "sounds/MP3_Player_Death2",
  "sounds/MP3_Player_Pain1",
  "sounds/MP3_Player_Pain2",
  "sounds/MP3_Potion_Collect",
  "sounds/MP3_Potion_Use",
  "sounds/MP3_Ranged_Attack",
  "sounds/MP3_Score_Counter",
  "sounds/MP3_Step1",
  "sounds/MP3_Step2",
  "sounds/MP3_Sword_Hit1",
  "sounds/MP3_Sword_Hit2",
  "sounds/MP3_Sword_Swing1",
  "sounds/MP3_Sword_Swing2",
  "sounds/MP3_Water_Splash1",
  "sounds/MP3_Water_Splash2",
