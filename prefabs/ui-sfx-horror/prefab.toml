[assets."sounds/Swipe_Open_1"]
description = "Horror-synth swipe-open whoosh, ~2s — menu sliding into view with an uneasy rising sweep."
tags = [ "asset_type:sound", "audio_type:ui-sound" ]

[assets."sounds/Swipe_Open_2"]
description = "Tighter dark open swipe, ~1.5s — quick dread-laced synth whoosh for revealing a panel."
