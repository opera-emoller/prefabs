[assets."sounds/Yes_Button_1"]
description = "Affirming horror-synth 'Yes'/confirm sting, ~4.5s — ominous accept tone with a dark resolve."
tags = [ "asset_type:sound", "audio_type:ui-sound", "subject:button" ]

[assets."sounds/Yes_Button_2"]
description = "Shorter dread-tinged confirm blip, ~3.5s — eerie synth 'Yes' acknowledgement."
tags = [ "asset_type:sound", "audio_type:ui-sound", "subject:button" ]
