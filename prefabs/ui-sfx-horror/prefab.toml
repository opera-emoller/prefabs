[assets."sounds/Task_Complete_1"]
description = "Drawn-out horror-synth completion chime, ~6s — ominous success sting that resolves uneasily."
tags = [ "asset_type:sound", "audio_type:ui-sound" ]

[assets."sounds/Task_Complete_2"]
description = "Alternate long completion stinger, ~6s — dark, brooding 'task done' synth flourish."
tags = [ "asset_type:sound", "audio_type:ui-sound" ]

[assets."sounds/Task_Failed_1"]
description = "Foreboding failure sting, ~4s — descending horror-synth tone signaling an error or failed action."
tags = [ "asset_type:sound", "audio_type:ui-sound" ]

[assets."sounds/Task_Failed_2"]
description = "Extended dread-laced failure stinger, ~6s — long sinister synth drone for a failed task."
tags = [ "asset_type:sound", "audio_type:ui-sound" ]

[assets."sounds/Timer_Tick_1"]
description = "Very short horror-synth tick, ~0.18s — sharp uneasy clock tick for countdowns."
tags = [ "asset_type:sound", "audio_type:ui-sound" ]

[assets."sounds/Timer_Tick_2"]
description = "Tiny clipped tick, ~0.1s — faint dread-tinged synth tock for timers."
tags = [ "asset_type:sound", "audio_type:ui-sound" ]

[assets."sounds/Window_Close_1"]
description = "Dark horror-synth window-close, ~1.25s — panel dismissing with a hollow downward tone."
tags = [ "asset_type:sound", "audio_type:ui-sound" ]

[assets."sounds/Window_Close_2"]
description = "Longer ominous window-close, ~2s — eerie synth fade as a window shuts."
tags = [ "asset_type:sound", "audio_type:ui-sound" ]

[assets."sounds/Window_Open_1"]
