asset_bundle = true
license = "Apache-2.0"
description = "A pack of ~39 user-interface sound effects voiced as soft woodwind tones — gentle flute-like clicks, hovers, pops, confirmations, errors and navigation cues with a warm, mellow, organic character."
tags = [ "role:ui" ]

# Demo-only resources: present so `gmx run` works here, but kept out of
# the published index and out of what consumers pull.
exclude = [
  "objects/obj_demo",
  "rooms/rm_demo",
]

[assets."sounds/Keyboard_Click_1"]
description = "Soft woodwind keyboard-click blip, ~1.0s — gentle flute-toned typing tick."
